<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeaderGuard - Web Security Header Checker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

    <header class="border-b border-slate-800">
        <div class="max-w-3xl mx-auto px-6 py-6">
            <h1 class="text-2xl font-bold flex items-center gap-2">
                <span class="text-emerald-400">🛡️</span> HeaderGuard
            </h1>
            <p class="text-slate-400 text-sm mt-1">
                Analyze your website's HTTP security headers
            </p>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-12">
        <div class="bg-slate-900 border border-slate-800 rounded-xl p-8">
            <label for="url-input" class="block text-sm font-medium text-slate-300 mb-2">
                Website URL
            </label>
            <form id="scan-form" class="flex gap-3">
                <input
                    type="text"
                    id="url-input"
                    name="url"
                    placeholder="https://example.com"
                    class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-4 py-3 text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-emerald-500"
                    required
                >
                <button
                    type="submit"
                    class="bg-emerald-500 hover:bg-emerald-400 text-slate-950 font-semibold px-6 py-3 rounded-lg transition-colors"
                >
                    Scan
                </button>
            </form>

            <div id="loading-indicator" class="hidden mt-6 flex items-center gap-3 text-slate-400">
                <svg class="animate-spin h-5 w-5 text-emerald-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                </svg>
                <span class="text-sm">Scanning headers, please wait...</span>
            </div>

        </div>

        <div id="result-container" class="mt-8"></div>
    </main>
    <script src="/static/js/main.js"></script>
</body>
</html>
